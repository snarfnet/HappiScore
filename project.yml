name: HappiScore
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.3"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  HappiScore:
    type: application
    platform: iOS
    sources: [HappiScore]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.happiscore
        INFOPLIST_FILE: HappiScore/Info.plist
        CODE_SIGN_ENTITLEMENTS: HappiScore/HappiScore.entitlements
    dependencies:
      - package: GoogleMobileAds
    postCompileScripts: []

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.13.0"
